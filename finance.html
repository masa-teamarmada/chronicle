<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chronicle ¥">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/masa-teamarmada/chronicle/main/icon_finance.png">
  <title>Chronicle ¥</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #FDF0F2;
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #C4687A;
    }
    .logo { font-size: 13px; letter-spacing: 0.2em; margin-bottom: 8px; opacity: 0.6; }
    .title { font-size: 28px; font-weight: 700; margin-bottom: 48px; }
    .icon-img {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      margin-bottom: 48px;
      box-shadow: 0 8px 24px rgba(196,104,122,0.2);
    }
    .instruction {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      opacity: 0.8;
    }
    .arrow {
      font-size: 28px;
      animation: bounce 1.2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }
  </style>
  <script>
    if (window.navigator.standalone) {
      window.location.href = 'https://script.google.com/a/macros/team-armada.jp/s/AKfycby1a23C4SDhvCsag2TwvTEwgGsEh5zpaJlbV1O1lxgW-8AZgF1gnrzYk-DwNhWYZYTj/exec?page=finance';
    }
  </script>
</head>
<body>
  <p class="logo">CHRONICLE</p>
  <p class="title">— ¥ —</p>
  <img class="icon-img" src="https://raw.githubusercontent.com/masa-teamarmada/chronicle/main/icon_finance.png" alt="Chronicle">
  <div class="instruction">
    <p>ホーム画面に追加して使ってね</p>
    <div class="arrow">↓</div>
    <p>下の共有ボタン → 「ホーム画面に追加」</p>
  </div>
</body>
</html>
